services:
  api:
    build:
      context: .
      dockerfile: src/TravelInsight.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

  frontend:
    build:
      context: src/TravelInsight.Frontend
    ports:
      - "3000:80"
    depends_on:
      - api
